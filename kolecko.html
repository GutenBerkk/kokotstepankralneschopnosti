<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolečko Risk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div id="container">
            <div style="display: flex; gap: 15px;">
                <div id="CoinFlip">
                    <a href="CoinFlip.html"><button>CoinFlip</button></a>
                </div>
                <div id="Menu">
                    <a href="index.html"><button>Hlavní Menu</button></a>
                </div>
                <div id="Kolecko">
                    <a href="kolecko.html"><button>Kolečko</button></a>
                </div>
            </div>
        </div>
    </header>

    <main id="container">
        <div>
            <h2>Peněženka: <span id="penize">100</span> Kč</h2>
        </div>

        <div class="circle-wrapper">
            <!-- Tady jsou klíčové eventy pro držení myši/prstu -->
            <div id="koleckoGame" onmousedown="zacniNafukovat()" ontouchstart="zacniNafukovat()"></div>
        </div>

        <div id="vysledek">Podrž kolečko! (Vklad 5 Kč)</div>
        <div id="Nasobitel">Možná výhra: 0 Kč</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
